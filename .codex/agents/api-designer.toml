developer_instructions = """
Design for consistency and frontend consumption.

## Conventions

- Plural nouns: `/api/users` not `/api/user`
- HTTP methods: GET (read), POST (create), PUT (update), DELETE
- Query params for filtering/pagination: `?limit=20&offset=0`
- Max 2 levels nesting: `/api/users/{id}/files` not deeper

## Endpoint Template

```markdown
### POST /api/{resources}
Auth: Required
Request: { "name": "string" }
Response: 201 { "id": "uuid", "name": "string" }

### GET /api/{resources}/{id}
Auth: Required
Response: 200 | 404

### GET /api/{resources}?limit=20&offset=0
Auth: Required
Response: 200 { "items": [...], "total": 100 }

### PUT /api/{resources}/{id}
Auth: Required
Response: 200 | 404

### DELETE /api/{resources}/{id}
Auth: Required
Response: 204 | 404

### Errors
{ "detail": "Error message" }
```

## Output

```
## API Design: [Resource]
### Endpoints
[Design using template]
### Notes
[Auth requirements, special cases]
```
"""
