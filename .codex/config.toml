model = "gpt-5.4"
model_reasoning_effort = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

developer_instructions = """
After writing or editing any .ts/.tsx/.js/.jsx file, run: npx prettier --write <file>
After writing or editing any .py file, run: ruff format <file>
Before any git commit, run: .codex/scripts/pre-commit-check.sh
"""

[features]
multi_agent = true

[mcp_servers.magic]
command = "npx"
args = ["-y", "@21st-dev/magic@latest"]
transport = "stdio"

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]
transport = "stdio"

[mcp_servers.neon]
url = "https://mcp.neon.tech/mcp"
transport = "http"

[mcp_servers.redis-cloud]
command = "npx"
args = ["-y", "@redis/mcp-redis-cloud"]
transport = "stdio"
env = { REDIS_CLOUD_API_KEY = "$REDIS_CLOUD_API_KEY", REDIS_CLOUD_SECRET_KEY = "$REDIS_CLOUD_SECRET_KEY" }

[agents]
max_threads = 6
max_depth = 1

[agents.code-reviewer]
description = "Review code for quality, patterns, security. Use after completing significant changes."
config_file = "agents/code-reviewer.toml"

[agents.pattern-enforcer]
description = "Verify code follows AGENTS.md patterns. Use during review or after code gen."
config_file = "agents/pattern-enforcer.toml"

[agents.security-auditor]
description = "Audit for vulnerabilities, OWASP top 10. Use after auth/API changes, before deploy."
config_file = "agents/security-auditor.toml"

[agents.edge-case-auditor]
description = "Check edge cases, error handling, failure scenarios. Use after implementing features."
config_file = "agents/edge-case-auditor.toml"

[agents.performance-analyzer]
description = "Find performance issues, N+1 queries, memory leaks."
config_file = "agents/performance-analyzer.toml"

[agents.architect]
description = "Architecture decisions, complex feature planning. Use for multi-service changes."
config_file = "agents/architect.toml"

[agents.ux-critic]
description = "Analyze user flows for friction, cognitive load. Use when designing/reviewing UI."
config_file = "agents/ux-critic.toml"

[agents.api-designer]
description = "Design RESTful API endpoints. Use when planning new backend features."
config_file = "agents/api-designer.toml"

[agents.requirements-analyst]
description = "Transform vague requests into clear specs. Use before starting features."
config_file = "agents/requirements-analyst.toml"

[agents.implementor]
description = "General-purpose coding agent. Spawn multiple in parallel for independent tasks."
config_file = "agents/implementor.toml"

[agents.refactoring-expert]
description = "Improve code structure, reduce tech debt. Use when code is unwieldy."
config_file = "agents/refactoring-expert.toml"

[agents.docs-generator]
description = "Generate API docs, component docs, README sections. Use after completing features."
config_file = "agents/docs-generator.toml"

[agents.tech-stack-researcher]
description = "Evaluate new libraries for stack compatibility. Use when adding dependencies."
config_file = "agents/tech-stack-researcher.toml"

# Profiles
[profiles.review]
model_reasoning_effort = "high"
sandbox_mode = "read-only"
developer_instructions = "Focus on code review. Read and analyze only. Do not make changes."

[profiles.implement]
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"

[profiles.ci]
model_reasoning_effort = "low"
approval_policy = "never"
sandbox_mode = "workspace-write"
