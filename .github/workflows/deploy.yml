name: Deploy

on:
  # Auto-deploy on push to main
  push:
    branches:
      - main
    paths:
      - "services/**"
      - "packages/**"
      - "features.json"
      - "terraform/**"

  # Manual trigger (uses branch name as environment)
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Configuration
  # ─────────────────────────────────────────────────────────────────────────────
  config:
    name: Load Configuration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      is_production: ${{ steps.env.outputs.is_production }}
      app_id: ${{ steps.features.outputs.app_id }}
      app_name: ${{ steps.features.outputs.app_name }}
      redis_key_prefix: ${{ steps.features.outputs.redis_key_prefix }}
      redis: ${{ steps.features.outputs.redis }}
      worker: ${{ steps.features.outputs.worker }}
      temporal: ${{ steps.features.outputs.temporal }}
      llm_openai: ${{ steps.features.outputs.llm_openai }}
      llm_anthropic: ${{ steps.features.outputs.llm_anthropic }}
      llm_gemini: ${{ steps.features.outputs.llm_gemini }}
      langfuse: ${{ steps.features.outputs.langfuse }}
      # Cloud Run URL components for service URL prediction
      # Format: https://{service}-{project_number}.{region}.run.app
      cloud_run_project_number: ${{ steps.cloud-run.outputs.project_number }}
      cloud_run_url_region: ${{ steps.cloud-run.outputs.url_region }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          BRANCH="${{ github.ref_name }}"

          # Map branch to environment
          if [ "$BRANCH" = "main" ]; then
            ENV="prod"
          elif [ "$BRANCH" = "staging" ]; then
            ENV="staging"
          else
            ENV="$BRANCH"
          fi

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "Environment: $ENV"

          if [ "$ENV" = "prod" ]; then
            echo "is_production=true" >> $GITHUB_OUTPUT
          else
            echo "is_production=false" >> $GITHUB_OUTPUT
          fi

      - name: Parse features.json
        id: features
        run: ./scripts/features.sh --github >> $GITHUB_OUTPUT

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Discover Cloud Run URL pattern
        id: cloud-run
        env:
          REGION: ${{ vars.REGION || 'asia-southeast1' }}
        run: |
          # Cloud Run URLs: https://{service}-{project_number}.{region}.run.app
          # The project number is constant per GCP project.

          # Get URL from any existing Cloud Run service
          EXISTING_URL=$(gcloud run services list --region=$REGION --format='value(URL)' --limit=1 2>/dev/null || echo "")

          if [ -z "$EXISTING_URL" ]; then
            echo "::error::No Cloud Run services found in project. Deploy any service first."
            exit 1
          fi

          echo "Found existing service: $EXISTING_URL"

          # Extract project number and region: https://svc-PROJECT_NUMBER.REGION.run.app
          PROJECT_NUMBER=$(echo "$EXISTING_URL" | sed -n 's/.*-\([0-9]\{9,\}\)\.\([a-z0-9-]*\)\.run\.app.*/\1/p')
          URL_REGION=$(echo "$EXISTING_URL" | sed -n 's/.*-\([0-9]\{9,\}\)\.\([a-z0-9-]*\)\.run\.app.*/\2/p')

          if [ -z "$PROJECT_NUMBER" ] || [ -z "$URL_REGION" ]; then
            echo "::error::Failed to extract project_number/region from URL: $EXISTING_URL"
            exit 1
          fi

          echo "Cloud Run project_number: $PROJECT_NUMBER, region: $URL_REGION"
          echo "project_number=$PROJECT_NUMBER" >> $GITHUB_OUTPUT
          echo "url_region=$URL_REGION" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────────────────────
  # Database Branch (dev environments only)
  # ─────────────────────────────────────────────────────────────────────────────
  database:
    name: Database Branch
    needs: [config]
    if: needs.config.outputs.is_production == 'false'
    uses: ./.github/workflows/_neon.yml
    with:
      action: create
      branch_name: ${{ needs.config.outputs.environment }}
    secrets: inherit

  # ─────────────────────────────────────────────────────────────────────────────
  # Build Images
  # ─────────────────────────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    needs: [config]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image_url: ${{ steps.set-output.outputs.image_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ vars.REGION || 'asia-southeast1' }}-docker.pkg.dev --quiet

      - name: Create Artifact Registry
        id: registry
        run: |
          REGION="${{ vars.REGION || 'asia-southeast1' }}"
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          APP_NAME="${{ vars.APP_NAME || 'app' }}"
          ENV="${{ needs.config.outputs.environment }}"
          SERVICE_NAME=$(echo "${APP_NAME}-backend-${ENV}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')
          [[ "$SERVICE_NAME" =~ ^[0-9] ]] && SERVICE_NAME="app-${SERVICE_NAME}"

          if ! gcloud artifacts repositories describe ${SERVICE_NAME} --location=${REGION} --project=${PROJECT_ID} &>/dev/null; then
            gcloud artifacts repositories create ${SERVICE_NAME} \
              --repository-format=docker \
              --location=${REGION} \
              --project=${PROJECT_ID}
          fi

          REGISTRY_URL="${REGION}-docker.pkg.dev/${PROJECT_ID}/${SERVICE_NAME}"
          IMAGE_URL="${REGISTRY_URL}/${SERVICE_NAME}:${{ github.sha }}"

          echo "registry_url=${REGISTRY_URL}" >> $GITHUB_OUTPUT
          echo "service_name=${SERVICE_NAME}" >> $GITHUB_OUTPUT
          echo "image_url=${IMAGE_URL}" >> $GITHUB_OUTPUT

          echo "Registry URL: ${REGISTRY_URL}"
          echo "Image URL: ${IMAGE_URL}"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/backend/Dockerfile
          push: true
          tags: ${{ steps.registry.outputs.image_url }}
          build-args: |
            FEATURE_REDIS=${{ needs.config.outputs.redis }}
            FEATURE_TEMPORAL=${{ needs.config.outputs.temporal }}
            FEATURE_LLM_OPENAI=${{ needs.config.outputs.llm_openai }}
            FEATURE_LLM_ANTHROPIC=${{ needs.config.outputs.llm_anthropic }}
            FEATURE_LLM_GEMINI=${{ needs.config.outputs.llm_gemini }}
            FEATURE_LANGFUSE=${{ needs.config.outputs.langfuse }}
          cache-from: type=gha,scope=backend-${{ needs.config.outputs.environment }}
          cache-to: type=gha,mode=max,scope=backend-${{ needs.config.outputs.environment }}

      - name: Set output
        id: set-output
        run: |
          # Base64 encode to avoid GitHub detecting secrets in output
          IMAGE_URL_B64=$(echo -n "${{ steps.registry.outputs.image_url }}" | base64 -w0)
          echo "image_url=${IMAGE_URL_B64}" >> $GITHUB_OUTPUT
          echo "Build output set (base64 encoded)"

  build-frontend:
    name: Build Frontend
    needs: [config]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_url: ${{ steps.set-output.outputs.image_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ vars.REGION || 'asia-southeast1' }}-docker.pkg.dev --quiet

      - name: Create Artifact Registry
        id: registry
        run: |
          REGION="${{ vars.REGION || 'asia-southeast1' }}"
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          APP_NAME="${{ vars.APP_NAME || 'app' }}"
          ENV="${{ needs.config.outputs.environment }}"
          SERVICE_NAME=$(echo "${APP_NAME}-frontend-${ENV}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')
          [[ "$SERVICE_NAME" =~ ^[0-9] ]] && SERVICE_NAME="app-${SERVICE_NAME}"

          if ! gcloud artifacts repositories describe ${SERVICE_NAME} --location=${REGION} --project=${PROJECT_ID} &>/dev/null; then
            gcloud artifacts repositories create ${SERVICE_NAME} \
              --repository-format=docker \
              --location=${REGION} \
              --project=${PROJECT_ID}
          fi

          REGISTRY_URL="${REGION}-docker.pkg.dev/${PROJECT_ID}/${SERVICE_NAME}"
          IMAGE_URL="${REGISTRY_URL}/${SERVICE_NAME}:${{ github.sha }}"

          echo "registry_url=${REGISTRY_URL}" >> $GITHUB_OUTPUT
          echo "image_url=${IMAGE_URL}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/frontend/Dockerfile
          push: true
          tags: ${{ steps.registry.outputs.image_url }}
          build-args: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          cache-from: type=gha,scope=frontend-${{ needs.config.outputs.environment }}
          cache-to: type=gha,mode=max,scope=frontend-${{ needs.config.outputs.environment }}

      - name: Set output
        id: set-output
        run: |
          # Base64 encode to avoid GitHub detecting secrets in output
          IMAGE_URL_B64=$(echo -n "${{ steps.registry.outputs.image_url }}" | base64 -w0)
          echo "image_url=${IMAGE_URL_B64}" >> $GITHUB_OUTPUT
          echo "Build output set (base64 encoded)"

  build-worker:
    name: Build Worker
    needs: [config]
    if: needs.config.outputs.worker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_url: ${{ steps.set-output.outputs.image_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ vars.REGION || 'asia-southeast1' }}-docker.pkg.dev --quiet

      - name: Create Artifact Registry
        id: registry
        run: |
          REGION="${{ vars.REGION || 'asia-southeast1' }}"
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          APP_NAME="${{ vars.APP_NAME || 'app' }}"
          ENV="${{ needs.config.outputs.environment }}"
          SERVICE_NAME=$(echo "${APP_NAME}-worker-${ENV}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')
          [[ "$SERVICE_NAME" =~ ^[0-9] ]] && SERVICE_NAME="app-${SERVICE_NAME}"

          if ! gcloud artifacts repositories describe ${SERVICE_NAME} --location=${REGION} --project=${PROJECT_ID} &>/dev/null; then
            gcloud artifacts repositories create ${SERVICE_NAME} \
              --repository-format=docker \
              --location=${REGION} \
              --project=${PROJECT_ID}
          fi

          REGISTRY_URL="${REGION}-docker.pkg.dev/${PROJECT_ID}/${SERVICE_NAME}"
          IMAGE_URL="${REGISTRY_URL}/${SERVICE_NAME}:${{ github.sha }}"

          echo "registry_url=${REGISTRY_URL}" >> $GITHUB_OUTPUT
          echo "image_url=${IMAGE_URL}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/worker/Dockerfile
          push: true
          tags: ${{ steps.registry.outputs.image_url }}
          build-args: |
            FEATURE_TEMPORAL=${{ needs.config.outputs.temporal }}
            FEATURE_LLM_OPENAI=${{ needs.config.outputs.llm_openai }}
            FEATURE_LLM_ANTHROPIC=${{ needs.config.outputs.llm_anthropic }}
            FEATURE_LLM_GEMINI=${{ needs.config.outputs.llm_gemini }}
          cache-from: type=gha,scope=worker-${{ needs.config.outputs.environment }}
          cache-to: type=gha,mode=max,scope=worker-${{ needs.config.outputs.environment }}

      - name: Set output
        id: set-output
        run: |
          # Base64 encode to avoid GitHub detecting secrets in output
          IMAGE_URL_B64=$(echo -n "${{ steps.registry.outputs.image_url }}" | base64 -w0)
          echo "image_url=${IMAGE_URL_B64}" >> $GITHUB_OUTPUT
          echo "Build output set (base64 encoded)"

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy Backend (first - creates Redis, Temporal)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    needs: [config, database, build-backend]
    if: |
      !cancelled() &&
      needs.build-backend.result == 'success' &&
      (needs.database.result == 'success' || needs.database.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      backend_url: ${{ steps.output.outputs.backend_url }}
      redis_url: ${{ steps.output.outputs.redis_url }}
      temporal_address: ${{ steps.output.outputs.temporal_address }}
      temporal_namespace: ${{ steps.output.outputs.temporal_namespace }}
      temporal_task_queue: ${{ steps.output.outputs.temporal_task_queue }}
      temporal_account_id: ${{ steps.temporal.outputs.account_id }}
    environment:
      name: ${{ needs.config.outputs.environment }}
      url: ${{ steps.output.outputs.backend_url }}
    env:
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp.json
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_environment: ${{ needs.config.outputs.environment }}
      TF_VAR_app_name: ${{ vars.APP_NAME || 'app' }}
      TF_VAR_region: ${{ vars.REGION || 'asia-southeast1' }}
      # Feature flags
      TF_VAR_feature_redis: ${{ needs.config.outputs.redis }}
      TF_VAR_feature_worker: ${{ needs.config.outputs.worker }}
      TF_VAR_feature_temporal: ${{ needs.config.outputs.temporal }}
      TF_VAR_redis_key_prefix: ${{ needs.config.outputs.redis_key_prefix }}
      # Secrets
      TF_VAR_openai_api_key: ${{ secrets.OPENAI_API_KEY }}
      TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      TF_VAR_gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
      TF_VAR_clerk_secret_key: ${{ secrets.CLERK_SECRET_KEY }}
      TF_VAR_clerk_webhook_secret: ${{ secrets.CLERK_WEBHOOK_SECRET }}
      TF_VAR_google_service_account_json: ${{ secrets.GOOGLE_CREDENTIALS }}
      TF_VAR_langfuse_public_key: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      TF_VAR_langfuse_secret_key: ${{ secrets.LANGFUSE_SECRET_KEY }}
      TF_VAR_temporal_api_key: ${{ secrets.TEMPORAL_API_KEY }}
      TF_VAR_temporal_region: ${{ vars.TEMPORAL_REGION || 'aws-ap-southeast-1' }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Export GCP credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > gcp.json

      - name: Authenticate gcloud
        run: |
          gcloud auth activate-service-account --key-file=gcp.json
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

      - name: Get Redis URL from Secret Manager
        if: needs.config.outputs.redis == 'true'
        run: |
          ENV="${{ needs.config.outputs.environment }}"
          # Map environment to secret (feature branches use dev)
          case "$ENV" in
            prod) SECRET="redis-url-prod" ;;
            staging) SECRET="redis-url-staging" ;;
            *) SECRET="redis-url-dev" ;;
          esac

          if ! REDIS_URL=$(gcloud secrets versions access latest --secret="$SECRET" 2>&1); then
            echo "::error::Failed to get Redis URL from Secret Manager ($SECRET): $REDIS_URL"
            exit 1
          fi
          if [ -z "$REDIS_URL" ]; then
            echo "::error::Redis URL from Secret Manager ($SECRET) is empty"
            exit 1
          fi

          echo "TF_VAR_redis_url=$REDIS_URL" >> $GITHUB_ENV
          echo "Using Redis URL from Secret Manager: $SECRET"

      - name: Decode image URL
        run: |
          # Decode base64-encoded image URL from build job
          IMAGE_URL=$(echo "${{ needs.build-backend.outputs.image_url }}" | base64 -d)
          echo "TF_VAR_image_url=${IMAGE_URL}" >> $GITHUB_ENV
          echo "Image URL decoded successfully"

      - name: Set database URL
        run: |
          # Prefer DATABASE_URL secret if set, otherwise use Neon branch
          if [ -n "${{ secrets.DATABASE_URL }}" ] && [ "${{ needs.config.outputs.is_production }}" = "true" ]; then
            echo "TF_VAR_database_url=${{ secrets.DATABASE_URL }}" >> $GITHUB_ENV
          else
            # Use Neon branch URL (base64 decode if needed)
            DB_URL="${{ needs.database.outputs.database_url }}"
            if [ -z "$DB_URL" ]; then
              echo "::error::No DATABASE_URL secret and no Neon branch URL available"
              exit 1
            fi
            if echo "$DB_URL" | grep -qE '^[A-Za-z0-9+/]+=*$'; then
              echo "TF_VAR_database_url=$(echo $DB_URL | base64 -d)" >> $GITHUB_ENV
            else
              echo "TF_VAR_database_url=$DB_URL" >> $GITHUB_ENV
            fi
          fi

      - name: Construct Worker URL (for HTTP activation)
        if: needs.config.outputs.worker == 'true'
        run: |
          # Construct worker URL: https://{service}-{project_number}.{region}.run.app
          APP_NAME="${{ vars.APP_NAME || 'app' }}"
          ENV="${{ needs.config.outputs.environment }}"
          PROJECT_NUMBER="${{ needs.config.outputs.cloud_run_project_number }}"
          URL_REGION="${{ needs.config.outputs.cloud_run_url_region }}"

          # Sanitize service name (same logic as terraform)
          SERVICE_NAME=$(echo "${APP_NAME}-worker-${ENV}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')
          [[ "$SERVICE_NAME" =~ ^[0-9] ]] && SERVICE_NAME="app-${SERVICE_NAME}"

          WORKER_URL="https://${SERVICE_NAME}-${PROJECT_NUMBER}.${URL_REGION}.run.app"
          echo "TF_VAR_worker_url=$WORKER_URL" >> $GITHUB_ENV
          echo "Worker URL (predicted): $WORKER_URL"

      - name: Validate image URL
        run: |
          if [ -z "$TF_VAR_image_url" ]; then
            echo "::error::Backend image URL is empty!"
            exit 1
          fi
          echo "Image URL: $TF_VAR_image_url"

      - name: Setup Go (for tcld)
        if: needs.config.outputs.temporal == 'true' && env.TF_VAR_temporal_api_key != ''
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Create Temporal Namespace
        id: temporal
        if: needs.config.outputs.temporal == 'true' && env.TF_VAR_temporal_api_key != ''
        env:
          TEMPORAL_CLOUD_API_KEY: ${{ secrets.TEMPORAL_API_KEY }}
        run: |
          # Install tcld CLI (build from source - no pre-built binaries available)
          echo "Installing tcld CLI..."
          go install github.com/temporalio/tcld/cmd/tcld@latest
          export PATH="$HOME/go/bin:$PATH"

          # Verify installation
          tcld version

          # Compute namespace name (must match Terraform's local.temporal_namespace_name)
          APP_NAME="${{ vars.APP_NAME || 'app' }}"
          ENV="${{ needs.config.outputs.environment }}"
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"

          # Sanitize app name (prefix if starts with number)
          [[ "$APP_NAME" =~ ^[0-9] ]] && APP_NAME="app-${APP_NAME}"

          # Sanitize environment (lowercase, replace special chars, limit length)
          SANITIZED_ENV=$(echo "$ENV" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | cut -c1-20)

          # Generate hash suffix (same as Terraform: substr(md5("${project_id}-${app_name}"), 0, 4))
          HASH_SUFFIX=$(echo -n "${PROJECT_ID}-${{ vars.APP_NAME || 'app' }}" | md5sum | cut -c1-4)

          # Temporal Cloud namespace limit is 39 chars: {app}-{env}-{hash}
          # Truncate app name to fit: 39 - 1 (dash) - len(env) - 1 (dash) - 4 (hash)
          MAX_APP_LEN=$(( 39 - 1 - ${#SANITIZED_ENV} - 1 - 4 ))
          APP_NAME=$(echo "$APP_NAME" | cut -c1-${MAX_APP_LEN} | sed 's/-$//')

          NAMESPACE="${APP_NAME}-${SANITIZED_ENV}-${HASH_SUFFIX}"
          TEMPORAL_REGION="${{ vars.TEMPORAL_REGION || 'aws-ap-southeast-1' }}"

          echo "Checking Temporal namespace: $NAMESPACE in region $TEMPORAL_REGION"

          # Add go bin to PATH for subsequent commands
          export PATH="$HOME/go/bin:$PATH"

          # Try to create namespace (idempotent - AlreadyExists is OK)
          echo "Creating/verifying namespace: $NAMESPACE"
          CREATE_OUTPUT=$(tcld namespace create \
            --namespace "$NAMESPACE" \
            --region "$TEMPORAL_REGION" \
            --retention-days 7 \
            --auth-method api_key 2>&1) || true

          echo "$CREATE_OUTPUT"

          # Check if it was created or already exists
          if echo "$CREATE_OUTPUT" | jq -e '.requestStatus' &>/dev/null; then
            # New namespace created - extract full namespace from resourceId
            FULL_NAMESPACE=$(echo "$CREATE_OUTPUT" | jq -r '.requestStatus.resourceId // empty')

            # Wait for creation to complete
            REQUEST_ID=$(echo "$CREATE_OUTPUT" | jq -r '.requestStatus.requestId // empty')
            if [ -n "$REQUEST_ID" ]; then
              echo "Waiting for namespace creation to complete (request: $REQUEST_ID)..."
              for i in {1..30}; do
                sleep 10
                STATUS=$(tcld request get --request-id "$REQUEST_ID" 2>/dev/null | jq -r '.requestStatus.state // "Unknown"')
                echo "  Status: $STATUS"
                if [ "$STATUS" = "Fulfilled" ]; then
                  echo "Namespace created successfully"
                  break
                elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Rejected" ]; then
                  echo "::error::Namespace creation failed with status: $STATUS"
                  exit 1
                fi
              done
            fi
          elif echo "$CREATE_OUTPUT" | grep -q "AlreadyExists"; then
            echo "Namespace already exists, fetching details..."
            # Get the existing namespace - tcld namespace list returns all namespaces
            # Format varies but namespace names contain the account suffix
            FULL_NAMESPACE=$(tcld namespace list 2>/dev/null | grep -o "${NAMESPACE}\.[a-z0-9]*" | head -1)
            if [ -z "$FULL_NAMESPACE" ]; then
              echo "::error::Could not determine account ID from tcld namespace list."
              exit 1
            fi
          else
            echo "::error::Failed to create namespace: $CREATE_OUTPUT"
            exit 1
          fi

          # Extract account ID from full namespace (e.g., myapp-prod-abc1.xtjkf -> xtjkf)
          if [ -n "$FULL_NAMESPACE" ]; then
            ACCOUNT_ID="${FULL_NAMESPACE##*.}"
            echo "Temporal account ID: $ACCOUNT_ID"
            echo "TF_VAR_temporal_account_id=$ACCOUNT_ID" >> $GITHUB_ENV
            echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
            echo "Temporal namespace: $FULL_NAMESPACE"
          else
            echo "::error::Could not determine full namespace name"
            exit 1
          fi

      - name: Terraform Init
        working-directory: terraform/services/backend
        run: |
          terraform init -upgrade \
            -backend-config="bucket=${{ secrets.TFSTATE_BUCKET }}" \
            -backend-config="prefix=${{ github.event.repository.name }}/services/backend"

      - name: Terraform Workspace
        working-directory: terraform/services/backend
        run: terraform workspace select "${{ needs.config.outputs.environment }}" || terraform workspace new "${{ needs.config.outputs.environment }}"

      - name: Terraform Apply
        working-directory: terraform/services/backend
        run: terraform apply -auto-approve -input=false

      - name: Run Migrations
        working-directory: terraform/services/backend
        run: |
          MIGRATION_JOB=$(terraform output -raw migration_job_name 2>/dev/null || echo "")
          if [ -n "$MIGRATION_JOB" ] && [ "$MIGRATION_JOB" != "null" ]; then
            gcloud run jobs execute "$MIGRATION_JOB" \
              --region ${{ vars.REGION || 'asia-southeast1' }} \
              --project ${{ secrets.GCP_PROJECT_ID }} \
              --wait || echo "Migration completed with warnings"
          fi

      - name: Set outputs
        id: output
        working-directory: terraform/services/backend
        run: |
          # Backend URL (always required)
          echo "backend_url=$(terraform output -raw backend_url)" >> $GITHUB_OUTPUT

          # Redis URL - required if feature enabled, optional otherwise
          if [ "${{ needs.config.outputs.redis }}" = "true" ]; then
            echo "redis_url=$(terraform output -json redis_url | jq -r '.')" >> $GITHUB_OUTPUT
          else
            REDIS_URL=$(terraform output -json redis_url 2>/dev/null | jq -r 'select(. != null and . != "")' || true)
            if [ -n "$REDIS_URL" ]; then echo "redis_url=$REDIS_URL" >> $GITHUB_OUTPUT; fi
          fi

          # Temporal config - required if feature enabled, optional otherwise
          if [ "${{ needs.config.outputs.temporal }}" = "true" ]; then
            echo "temporal_address=$(terraform output -json temporal_address | jq -r '.')" >> $GITHUB_OUTPUT
            echo "temporal_namespace=$(terraform output -json temporal_namespace | jq -r '.')" >> $GITHUB_OUTPUT
            echo "temporal_task_queue=$(terraform output -json temporal_task_queue | jq -r '.')" >> $GITHUB_OUTPUT
          else
            TEMPORAL_ADDRESS=$(terraform output -json temporal_address 2>/dev/null | jq -r 'select(. != null and . != "")' || true)
            TEMPORAL_NAMESPACE=$(terraform output -json temporal_namespace 2>/dev/null | jq -r 'select(. != null and . != "")' || true)
            TEMPORAL_TASK_QUEUE=$(terraform output -json temporal_task_queue 2>/dev/null | jq -r 'select(. != null and . != "")' || true)
            if [ -n "$TEMPORAL_ADDRESS" ]; then echo "temporal_address=$TEMPORAL_ADDRESS" >> $GITHUB_OUTPUT; fi
            if [ -n "$TEMPORAL_NAMESPACE" ]; then echo "temporal_namespace=$TEMPORAL_NAMESPACE" >> $GITHUB_OUTPUT; fi
            if [ -n "$TEMPORAL_TASK_QUEUE" ]; then echo "temporal_task_queue=$TEMPORAL_TASK_QUEUE" >> $GITHUB_OUTPUT; fi
          fi

      - name: Cleanup
        if: always()
        run: rm -f gcp.json

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy Worker (after backend)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-worker:
    name: Deploy Worker
    needs: [config, database, build-worker, deploy-backend]
    if: |
      !cancelled() &&
      needs.config.outputs.worker == 'true' &&
      needs.build-worker.result == 'success' &&
      needs.deploy-backend.result == 'success' &&
      (needs.database.result == 'success' || needs.database.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      worker_url: ${{ steps.output.outputs.worker_url }}
    environment:
      name: ${{ needs.config.outputs.environment }}-worker
      url: ${{ steps.output.outputs.worker_url }}
    env:
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp.json
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_environment: ${{ needs.config.outputs.environment }}
      TF_VAR_app_name: ${{ vars.APP_NAME || 'app' }}
      TF_VAR_region: ${{ vars.REGION || 'asia-southeast1' }}
      TF_VAR_redis_key_prefix: ${{ needs.config.outputs.redis_key_prefix }}
      TF_VAR_feature_temporal: ${{ needs.config.outputs.temporal }}
      TF_VAR_temporal_api_key: ${{ secrets.TEMPORAL_API_KEY }}
      TF_VAR_temporal_region: ${{ vars.TEMPORAL_REGION || 'aws-ap-southeast-1' }}
      TF_VAR_temporal_account_id: ${{ needs.deploy-backend.outputs.temporal_account_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Export GCP credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > gcp.json

      - name: Authenticate gcloud
        run: |
          gcloud auth activate-service-account --key-file=gcp.json
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

      - name: Get Redis URL from Secret Manager
        run: |
          ENV="${{ needs.config.outputs.environment }}"
          case "$ENV" in
            prod) SECRET="redis-url-prod" ;;
            staging) SECRET="redis-url-staging" ;;
            *) SECRET="redis-url-dev" ;;
          esac

          if ! REDIS_URL=$(gcloud secrets versions access latest --secret="$SECRET" 2>&1); then
            echo "::error::Failed to get Redis URL from Secret Manager ($SECRET): $REDIS_URL"
            exit 1
          fi
          if [ -z "$REDIS_URL" ]; then
            echo "::error::Redis URL from Secret Manager ($SECRET) is empty"
            exit 1
          fi

          echo "TF_VAR_redis_url=$REDIS_URL" >> $GITHUB_ENV

      - name: Decode image URL
        run: |
          IMAGE_URL=$(echo "${{ needs.build-worker.outputs.image_url }}" | base64 -d)
          echo "TF_VAR_image_url=${IMAGE_URL}" >> $GITHUB_ENV

      - name: Set database URL
        run: |
          # Prefer DATABASE_URL secret if set, otherwise use Neon branch
          if [ -n "${{ secrets.DATABASE_URL }}" ] && [ "${{ needs.config.outputs.is_production }}" = "true" ]; then
            echo "TF_VAR_database_url=${{ secrets.DATABASE_URL }}" >> $GITHUB_ENV
          else
            # Use Neon branch URL (base64 decode if needed)
            DB_URL="${{ needs.database.outputs.database_url }}"
            if [ -z "$DB_URL" ]; then
              echo "::error::No DATABASE_URL secret and no Neon branch URL available"
              exit 1
            fi
            if echo "$DB_URL" | grep -qE '^[A-Za-z0-9+/]+=*$'; then
              echo "TF_VAR_database_url=$(echo $DB_URL | base64 -d)" >> $GITHUB_ENV
            else
              echo "TF_VAR_database_url=$DB_URL" >> $GITHUB_ENV
            fi
          fi

      - name: Terraform Init
        working-directory: terraform/services/worker
        run: |
          terraform init -upgrade \
            -backend-config="bucket=${{ secrets.TFSTATE_BUCKET }}" \
            -backend-config="prefix=${{ github.event.repository.name }}/services/worker"

      - name: Terraform Workspace
        working-directory: terraform/services/worker
        run: terraform workspace select "${{ needs.config.outputs.environment }}" || terraform workspace new "${{ needs.config.outputs.environment }}"

      - name: Terraform Apply
        working-directory: terraform/services/worker
        run: terraform apply -auto-approve -input=false

      - name: Set outputs
        id: output
        working-directory: terraform/services/worker
        run: echo "worker_url=$(terraform output -raw worker_url)" >> $GITHUB_OUTPUT

      - name: Cleanup
        if: always()
        run: rm -f gcp.json

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy Frontend (after backend - needs backend_url)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    needs: [config, build-frontend, deploy-backend]
    if: |
      !cancelled() &&
      needs.build-frontend.result == 'success' &&
      needs.deploy-backend.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      frontend_url: ${{ steps.output.outputs.frontend_url }}
    environment:
      name: ${{ needs.config.outputs.environment }}-frontend
      url: ${{ steps.output.outputs.frontend_url }}
    env:
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp.json
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_environment: ${{ needs.config.outputs.environment }}
      TF_VAR_app_name: ${{ vars.APP_NAME || 'app' }}
      TF_VAR_region: ${{ vars.REGION || 'asia-southeast1' }}
      TF_VAR_backend_url: ${{ needs.deploy-backend.outputs.backend_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Export GCP credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > gcp.json

      - name: Decode image URL
        run: |
          IMAGE_URL=$(echo "${{ needs.build-frontend.outputs.image_url }}" | base64 -d)
          echo "TF_VAR_image_url=${IMAGE_URL}" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: terraform/services/frontend
        run: |
          terraform init -upgrade \
            -backend-config="bucket=${{ secrets.TFSTATE_BUCKET }}" \
            -backend-config="prefix=${{ github.event.repository.name }}/services/frontend"

      - name: Terraform Workspace
        working-directory: terraform/services/frontend
        run: terraform workspace select "${{ needs.config.outputs.environment }}" || terraform workspace new "${{ needs.config.outputs.environment }}"

      - name: Terraform Apply
        working-directory: terraform/services/frontend
        run: terraform apply -auto-approve -input=false

      - name: Set outputs
        id: output
        working-directory: terraform/services/frontend
        run: echo "frontend_url=$(terraform output -raw frontend_url)" >> $GITHUB_OUTPUT

      - name: Cleanup
        if: always()
        run: rm -f gcp.json
