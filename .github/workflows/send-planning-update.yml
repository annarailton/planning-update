name: Send Planning Update

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  send-update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        run: uv sync

      - name: Oxford connectivity diagnostics
        run: |
          set -x
          echo "Runner public IP:"
          curl -s https://api.ipify.org || true
          echo
          echo "DNS lookup:"
          getent hosts public.oxford.gov.uk || true
          echo "HTTPS HEAD request:"
          curl -I -v --connect-timeout 10 --max-time 20 "https://public.oxford.gov.uk/online-applications/search.do?action=weeklyList" || true

      - name: Send planning update
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: uv run oxford-weekly --config planning_update.toml
