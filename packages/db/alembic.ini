# Alembic Configuration - Centralized Database Migrations
# This file is the single source of truth for all database migrations
# across backend, worker, and any other services.

[alembic]
# path to migration scripts (%(here)s = directory containing this file)
script_location = %(here)s/alembic

# template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# Points to project root so packages.db is importable
prepend_sys_path = ../..

# timezone to use when rendering the date within the migration file
timezone = UTC

# max length of characters to apply to the "slug" field
truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
sourceless = false

# version location specification
version_locations = %(here)s/alembic/versions

# output encoding
output_encoding = utf-8

# Placeholder - actual URL comes from DATABASE_URL env var
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# Format using black
hooks = black
black.type = console_scripts
black.entrypoint = black


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
