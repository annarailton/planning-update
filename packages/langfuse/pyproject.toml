[project]
name = "packages-langfuse"
version = "0.1.0"
description = "Optional Langfuse LLM observability package"
requires-python = ">=3.11"
dependencies = [
    "langfuse>=3.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-asyncio>=0.21.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
