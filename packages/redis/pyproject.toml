[project]
name = "packages-redis"
version = "0.1.0"
description = "Shared Redis package for client, pub/sub, and job queue"
requires-python = ">=3.11"
dependencies = [
    "redis>=5.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
