[project]
name = "packages-storage"
version = "0.1.0"
description = "Shared storage package for cloud provider abstraction"
requires-python = ">=3.11"
dependencies = [
    "google-cloud-storage>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
