server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Increase buffer sizes for large request headers (Clerk JWTs, cookies)
    # Default is 4 8k - increased for multiple JWT tokens + cookies
    large_client_header_buffers 4 64k;
    client_header_buffer_size 32k;

    # ─────────────────────────────────────────────────────────────────────────
    # API Reverse Proxy
    # Proxies /api/* requests to backend service (single-domain architecture)
    # ─────────────────────────────────────────────────────────────────────────
    location /api/ {
        # Use Google's DNS resolver for Cloud Run (re-resolve on each request)
        resolver 8.8.8.8 8.8.4.4 valid=30s ipv6=off;

        # Store backend URL in variable to force DNS re-resolution per request
        set $backend "${BACKEND_URL}";

        # CRITICAL for HTTPS backends: enable SNI (Server Name Indication)
        proxy_ssl_server_name on;

        # Proxy with full request URI (required when using variables)
        proxy_pass $backend$request_uri;
        proxy_http_version 1.1;

        # Pass original host for routing, but backend needs its own for SSL
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Increase buffer sizes for large headers (JWTs, cookies)
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # SSE/Streaming support (critical for real-time features)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;  # 24 hours for long-running SSE
        proxy_set_header Connection '';
        chunked_transfer_encoding off;

        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Static Files (SPA)
    # ─────────────────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Security Headers
    # ─────────────────────────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ─────────────────────────────────────────────────────────────────────────
    # Compression
    # ─────────────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
}
